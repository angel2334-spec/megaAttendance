<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modern to do app</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My daily planner</h1>
        <div class="input-box">
            <input type="text"placeholder="Enter your task...">

        </div>
        <div class="task-list">


            <div class="task">
                <span>I will wake up at 8 in the morning</span>
                <button class="delete-btn"></button>

        
            </div>
            <div class="task">
                <span>I will practice css for 1 hours</span>
                <button class="delete-btn"></button>

            </div>
            <div>
                <div class="task">
                <span>I will practice css for 2 hours</span>
                <button class="delete-btn"></button>
            </div>
            <div>
                <div class="task">
                <span> Then i will have breakfast</span>
                <button class="delete-btn"></button>
            </div>

        </div>

    </div>

        
</body>
</html>
